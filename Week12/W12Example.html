<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        function validate(){
            let fname = document.querySelector('#fname').value.trim();
            //field is required 
            if(fname.length==0){
                document.querySelector('#fname-error').textContent="You must provide value for the first name";
                document.querySelector('#fname-error').style.color="red"
                return false;
            }

                else if(fname.length<5){
                document.querySelector('#fname-error').textContent="First name must be more than 5 characters";
                document.querySelector('#fname-error').style.color="red"
                return false;
                }
                else{
                    fname = fname.toLowerCase();
                    for(let i=0;i<fname.length;i++){
                        if(fname[i]<'a'||fname[i]>'z'){
                            document.querySelector('#fname-error').textContent="All characters in First name must be alphabet";
                            return false;
                        }  }
               } return true;
            }       
    </script>
    <title>Week 12</title>
</head>
<body>
    <h1>Form Validation</h1>
    <form action="https://httpbin.org/get" method="get" onsubmit="return validate();">
        <div>
            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="fname" required>
            <span id="fname-error"></span>
        </div>
        <div>
            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lname" required>
        </div>
        <div>
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="18" max="99" required>
        </div>
        <div>
            <input type="submit">
            <input type="reset">
        </div>
    </form>
</body>
</html>
